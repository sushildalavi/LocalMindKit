name: LocalMindKit
options:
  minimumXcodeGenVersion: 2.40.0
packages:
  Core:
    path: .
targets:
  LocalMindKitApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/LocalMindKitApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sushildalavi.LocalMindKit
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "LocalMindKit reads your screenshots to index their text on-device so you can search them. Nothing leaves your device."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: Core
        product: LocalMindKitCore
