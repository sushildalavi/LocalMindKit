name: LocalMindKit
options:
  minimumXcodeGenVersion: 2.40.0
packages:
  Core:
    path: .
targets:
  LocalMindKitApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/LocalMindKitApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sushildalavi.LocalMindKit
        SWIFT_VERSION: "6.0"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    dependencies:
      - package: Core
        product: LocalMindKitCore
