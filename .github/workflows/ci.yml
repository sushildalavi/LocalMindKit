name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-tests:
    name: Core engine (build + test)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Swift 6 toolchain
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: swift --version

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test --enable-code-coverage

  # The "nothing leaves the device" privacy claim is enforced as a test, so a
  # green CI run is also a privacy guarantee (see NetworkAuditTests).
